# HA Spending Analyser — Example Lovelace Dashboard
#
# SETUP (one-time):
# 1. Copy www/spending_analyser/ to your HA config's www/ folder
# 2. In HA: Settings → Dashboards → Resources → Add resource:
#      URL:  /local/spending_analyser/spending-dashboard-card.js
#      Type: JavaScript module
# 3. Reload the browser (Ctrl+Shift+R)
# 4. Create a new dashboard and paste this YAML in raw edit mode,
#    OR add individual cards to an existing dashboard.
#
# Entity IDs: HA generates these from the device + sensor name.
# If they differ, check Settings → Entities and update below.

title: Spending
path: spending
icon: mdi:cash-multiple
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    cards:

      # ── Main spending card ────────────────────────────────────────
      - type: custom:spending-dashboard-card
        title: Spending Dashboard
        currency: "£"
        max_categories: 8
        spending_entity:      sensor.spending_analyser_monthly_spending
        income_entity:        sensor.spending_analyser_monthly_income
        net_entity:           sensor.spending_analyser_monthly_net
        uncategorised_entity: sensor.spending_analyser_uncategorised_transactions
        total_entity:         sensor.spending_analyser_total_transactions

      # ── Quick stats — stacked so titles aren't truncated ──────────
      - type: vertical-stack
        cards:
          - type: entity
            entity: sensor.spending_analyser_monthly_spending
            name: Spending This Month
            icon: mdi:cash-minus

          - type: entity
            entity: sensor.spending_analyser_monthly_income
            name: Income This Month
            icon: mdi:cash-plus

          - type: entity
            entity: sensor.spending_analyser_monthly_net
            name: Net This Month
            icon: mdi:bank-transfer

          - type: entity
            entity: sensor.spending_analyser_top_spending_category
            name: Top Spending Category
            icon: mdi:podium-gold

      # ── Uncategorised alert (only visible when count > 0) ─────────
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.spending_analyser_uncategorised_transactions
            above: 0
        card:
          type: markdown
          content: >
            ## ⚠ {{ states('sensor.spending_analyser_uncategorised_transactions') }} transactions need categorising

            Open **Review Transactions** in the sidebar to assign categories with AI suggestions.
            Each correction teaches the AI for future imports.

      # ── Action buttons ────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: button
            name: Import Statement
            icon: mdi:file-upload-outline
            tap_action:
              action: navigate
              navigation_path: /spending-upload

          - type: button
            name: Review Transactions
            icon: mdi:table-check
            tap_action:
              action: navigate
              navigation_path: /spending-review
