<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Bank Statement — Spending Analyser</title>
<style>
  :root {
    --ha-blue: #03a9f4;
    --success: #4caf50;
    --error:   #f44336;
    --warn:    #ff9800;
    --bg:      #fafafa;
    --card-bg: #ffffff;
    --border:  #e0e0e0;
    --text:    #212121;
    --muted:   #757575;
    --radius:  12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #111827;
      --card-bg: #1f2937;
      --border:  #374151;
      --text:    #f9fafb;
      --muted:   #9ca3af;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 520px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.83rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .drop-zone.drag-over {
    border-color: var(--ha-blue);
    background: rgba(3,169,244,.05);
  }
  .drop-zone.has-file {
    border-color: var(--success);
    background: rgba(76,175,80,.04);
  }
  .drop-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .drop-text { font-size: 0.9rem; color: var(--muted); }
  .drop-text strong { color: var(--ha-blue); }
  .drop-file-name {
    font-size: 0.88rem;
    font-weight: 600;
    margin-top: 6px;
    color: var(--success);
    display: none;
  }
  #file-input { display: none; }

  /* Options */
  .options { margin-top: 20px; }
  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .option-row:last-child { border-bottom: none; }
  .option-row label { flex: 1; cursor: pointer; }
  .option-row .hint { font-size: 0.78rem; color: var(--muted); display: block; }
  input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--ha-blue); cursor: pointer; }

  /* Submit */
  .btn {
    display: block;
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--ha-blue);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: .88; }

  /* Progress */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }
  .progress-fill {
    height: 100%;
    background: var(--ha-blue);
    width: 0;
    transition: width .3s;
    border-radius: 2px;
  }
  .progress-bar.active { display: block; }

  /* Result */
  .result {
    display: none;
    margin-top: 20px;
    padding: 16px;
    border-radius: 8px;
    font-size: 0.88rem;
  }
  .result.success { background: rgba(76,175,80,.1);  border: 1px solid rgba(76,175,80,.3);  color: var(--success); }
  .result.error   { background: rgba(244,67,54,.1);  border: 1px solid rgba(244,67,54,.3);  color: var(--error);   }
  .result.warning { background: rgba(255,152,0,.1);  border: 1px solid rgba(255,152,0,.3);  color: var(--warn);    }
  .result-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
  .result-detail { color: var(--text); font-size: 0.82rem; margin-top: 4px; }

  /* Formats */
  .formats {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }
  .formats span {
    display: inline-block;
    background: var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    margin: 2px;
    color: var(--text);
  }
</style>
</head>
<body>
<div class="card">
  <h1>📂 Import Bank Statement</h1>
  <p class="subtitle">Upload a statement file to import transactions into Spending Analyser.</p>

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📄</div>
    <div class="drop-text">
      <strong>Click to browse</strong> or drag &amp; drop a file here
    </div>
    <div class="drop-file-name" id="file-name"></div>
    <input type="file" id="file-input" accept=".csv,.ofx,.qfx,.qif">
  </div>

  <div class="options">
    <div class="option-row">
      <input type="checkbox" id="opt-categorise" checked>
      <label for="opt-categorise">
        AI categorisation (Ollama)
        <span class="hint">Each transaction is categorised automatically on import.</span>
      </label>
    </div>
  </div>

  <button class="btn" id="upload-btn" disabled>Import</button>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="result" id="result">
    <div class="result-title" id="result-title"></div>
    <div class="result-detail" id="result-detail"></div>
  </div>

  <div class="formats">
    Supported formats:
    <span>CSV (midata, First Direct, John Lewis, CommBank, ANZ, NAB, Westpac)</span>
    <span>OFX / QFX</span>
    <span>QIF</span>
  </div>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const fileNameEl = document.getElementById('file-name');
  const uploadBtn  = document.getElementById('upload-btn');
  const progressBar  = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const resultEl     = document.getElementById('result');
  const resultTitle  = document.getElementById('result-title');
  const resultDetail = document.getElementById('result-detail');

  let selectedFile = null;

  /* ── File selection ── */
  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  function setFile(file) {
    selectedFile = file;
    fileNameEl.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
    fileNameEl.style.display = 'block';
    dropZone.classList.add('has-file');
    uploadBtn.disabled = false;
    hideResult();
  }

  /* ── Upload ── */
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const token = getToken();
    if (!token) {
      showResult('error', 'Not authenticated', 'Could not find a Home Assistant auth token. Please open this page from within the HA UI.');
      return;
    }

    uploadBtn.disabled = true;
    progressBar.classList.add('active');
    animateProgress();
    hideResult();

    const form = new FormData();
    form.append('file', selectedFile);
    form.append('categorise', document.getElementById('opt-categorise').checked ? 'true' : 'false');

    try {
      const resp = await fetch('/api/spending_analyser/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form,
      });

      progressFill.style.width = '100%';
      await new Promise(r => setTimeout(r, 300));

      const data = await resp.json();

      if (!resp.ok) {
        showResult('error', `Upload failed (${resp.status})`, data.error || 'Unknown error');
      } else if (data.warning) {
        showResult('warning', 'Nothing imported', data.warning);
      } else {
        showResult(
          'success',
          `✓ Import complete`,
          `${data.added} transaction${data.added !== 1 ? 's' : ''} added` +
          (data.skipped ? `, ${data.skipped} duplicate${data.skipped !== 1 ? 's' : ''} skipped` : '') +
          ` from ${data.filename}`
        );
      }
    } catch (err) {
      showResult('error', 'Network error', err.message);
    } finally {
      uploadBtn.disabled = false;
      progressBar.classList.remove('active');
      progressFill.style.width = '0';
    }
  });

  function animateProgress() {
    let w = 0;
    const id = setInterval(() => {
      w = Math.min(w + Math.random() * 12, 85);
      progressFill.style.width = w + '%';
      if (!progressBar.classList.contains('active')) clearInterval(id);
    }, 250);
  }

  function showResult(type, title, detail) {
    resultEl.className = `result ${type}`;
    resultTitle.textContent = title;
    resultDetail.textContent = detail;
    resultEl.style.display = 'block';
  }
  function hideResult() { resultEl.style.display = 'none'; }

  /* ── HA token from localStorage ── */
  function getToken() {
    try {
      // HA stores tokens under 'hassTokens' keyed by client ID
      const raw = localStorage.getItem('hassTokens');
      if (!raw) return null;
      const entries = Object.values(JSON.parse(raw));
      return entries[0]?.access_token || entries[0]?.token || null;
    } catch { return null; }
  }
</script>
</body>
</html>
