import_statement:
  name: Import Bank Statement
  description: >
    Parse and import a bank statement file (CSV, OFX, QFX, QIF).
    Duplicate transactions (matched by date+description+amount hash) are silently skipped.
  fields:
    file_path:
      name: File path
      description: Absolute path on the HA host to the statement file.
      required: true
      example: "/config/statements/june_2024.csv"
      selector:
        text:
    format:
      name: Format
      description: "File format. Leave blank to auto-detect from extension/content."
      required: false
      example: "csv"
      selector:
        select:
          options:
            - "csv"
            - "ofx"
            - "qif"
    csv_date_column:
      name: CSV date column
      description: Override the date column name for non-standard CSV files.
      required: false
      example: "Txn Date"
      selector:
        text:
    csv_description_column:
      name: CSV description column
      description: Override the description column name for non-standard CSV files.
      required: false
      example: "Details"
      selector:
        text:
    csv_amount_column:
      name: CSV amount column
      description: Override the amount column name for non-standard CSV files.
      required: false
      example: "Net Amount"
      selector:
        text:
    categorise:
      name: AI categorise
      description: Run Ollama AI categorisation on import. Set false to skip and leave as Uncategorised.
      required: false
      default: true
      selector:
        boolean:

add_transaction:
  name: Add Transaction
  description: Manually add a single spending transaction.
  fields:
    date:
      name: Date
      description: Transaction date (YYYY-MM-DD).
      required: true
      example: "2024-06-15"
      selector:
        date:
    description:
      name: Description
      description: Merchant or transaction description.
      required: true
      example: "Woolworths Supermarket"
      selector:
        text:
    amount:
      name: Amount
      description: Transaction amount. Use negative for expenses, positive for income.
      required: true
      example: -42.50
      selector:
        number:
          min: -1000000
          max: 1000000
          step: 0.01
          mode: box
    category:
      name: Category
      description: Spending category. Defaults to 'Uncategorised'.
      required: false
      example: "Groceries"
      selector:
        text:
    account:
      name: Account
      description: Account identifier (e.g. last 4 digits of card).
      required: false
      example: "1234"
      selector:
        text:

recategorise:
  name: Recategorise Transaction
  description: Update the category of an existing transaction and teach the AI rule.
  fields:
    transaction_id:
      name: Transaction ID
      description: The integer ID of the transaction to update.
      required: true
      example: 42
      selector:
        number:
          min: 1
          mode: box
    category:
      name: Category
      description: The new category to assign.
      required: true
      example: "Groceries"
      selector:
        text:

generate_report:
  name: Generate AI Spending Report
  description: >
    Ask Ollama to analyse your spending data and generate a narrative report.
    The report appears as a persistent HA notification and is saved to
    config/spending_analyser/reports/.
  fields:
    prompt:
      name: Report type
      description: >
        Choose the style of analysis. Options:
        monthly_summary — friendly 2-3 paragraph overview;
        budget_health — structured Green/Amber/Red health check;
        savings_tips — top 3 personalised savings recommendations;
        month_comparison — this month vs last month changes;
        category_spotlight — deep dive into one category (requires category field);
        annual_overview — year-to-date patterns and habits.
      required: true
      example: "monthly_summary"
      selector:
        select:
          options:
            - label: "Monthly Summary"
              value: "monthly_summary"
            - label: "Budget Health Check"
              value: "budget_health"
            - label: "Savings Opportunities"
              value: "savings_tips"
            - label: "Month-on-Month Comparison"
              value: "month_comparison"
            - label: "Category Deep Dive"
              value: "category_spotlight"
            - label: "Year-to-Date Overview"
              value: "annual_overview"
    category:
      name: Category (for Category Deep Dive only)
      description: The spending category to analyse in depth.
      required: false
      example: "Dining & Takeaway"
      selector:
        text:
    year:
      name: Year
      description: Year to report on. Defaults to current year.
      required: false
      example: 2026
      selector:
        number:
          min: 2000
          max: 2100
          mode: box
    month:
      name: Month
      description: Month number (1-12) to report on. Defaults to current month.
      required: false
      example: 5
      selector:
        number:
          min: 1
          max: 12
          mode: box
    months_back:
      name: Months of history (annual overview only)
      description: How many months of data to include in the year-to-date report.
      required: false
      default: 12
      selector:
        number:
          min: 1
          max: 24
          mode: box
    currency:
      name: Currency symbol
      description: Currency symbol to display in the report.
      required: false
      default: "£"
      example: "£"
      selector:
        text:
